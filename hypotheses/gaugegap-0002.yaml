id: gaugegap-0002
track: GaugeGap
model: z2_open_plaquette_chain
scope: finite Z2 lattice gauge toy benchmark on an open chain of plaquettes
claim: >
  The finite open-plaquette Z2 Hamiltonian has a non-negative, reproducible
  spectral gap under dense exact diagonalization, and its Pauli operator export
  reproduces the same dense Hamiltonian within numerical tolerance.
prediction:
  observable: mass_gap
  expected_shape: finite_nonnegative_gap_at_registered_parameters
controls:
  n_plaquettes: [1, 2]
  plaquette_coupling: 1.0
  transverse_field: 0.2
  boundary: open-plaquette-chain
hamiltonian: H = -J sum_p prod_{l in p} Z_l - h sum_l X_l
validation:
  required:
    - dense_exact_diagonalization
    - pauli_dense_replica
    - finite_parameter_sweep
    - claim_boundary_certificate
  optional:
    - qiskit_sparse_pauli_export
    - local_statevector_vqe_style_prototype
  future:
    - noiseless_circuit_simulator
    - noisy_simulator
    - guarded_runtime_hardware_submission
kill_criteria:
  - dense Hamiltonian is not Hermitian
  - exact diagonalization returns a non-finite or negative gap
  - Pauli dense replica differs from direct dense Hamiltonian beyond tolerance
  - any certificate omits the finite-system claim boundary
status: active
notes:
  - Finite Z2 lattice gauge toy benchmark only; no continuum Yang-Mills mass-gap claim.
  - Local VQE-style results are simulator prototypes, not hardware evidence.
