name: Verify Proofs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[spectral,dev]'
      - name: Unit tests
        run: foundry run tests
      - name: Reproduce canonical finite CurveRank screen
        run: foundry run curverank-proof-reproduction
      - name: Check certified mismatch floor
        run: python scripts/check_curverank_reproduction.py /tmp/verify-proof 27.0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-results
          path: /tmp/verify-proof/
          retention-days: 7

  smt-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SMT backend
        run: python -m pip install -e '.[smt]'
      - name: Verify registered inequality schemas
        run: foundry run verify-certificates

  compile-coq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Compile emitted Coq certificates
        run: foundry run compile-coq

  hard-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Claim and maturity audits
        run: foundry audit
      - name: Upload audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-diagnostics
          path: |
            results/claim-boundary-audit/
            results/research-maturity-audit/
          if-no-files-found: warn
          retention-days: 7
      - name: Verify AGENTS.md boundary section
        run: |
          test -f AGENTS.md
          grep -q "Claim boundary" AGENTS.md

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Verify deterministic proofpack
        run: foundry run proofpack-verify
      - name: Build reviewer packet
        run: foundry run reviewer-packet
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reviewer-packet
          path: results/reviewer-packet
          if-no-files-found: warn
          retention-days: 7
