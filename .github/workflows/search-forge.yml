name: Search Forge

on:
  pull_request:
    paths:
      - 'src/gaugegap/search_forge.py'
      - 'src/gaugegap/scientific_search_spaces.py'
      - 'src/gaugegap/symbolic_search.py'
      - 'scripts/run_search_forge.py'
      - 'tests/test_search_forge.py'
      - 'config/foundry.d/99-search-forge.yaml'
      - 'docs/search-forge.md'
      - 'figures/search-forge/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Focused tests
        run: python -m pytest -q tests/test_search_forge.py
      - name: Foundry registration
        run: |
          foundry list | grep -q 'search-forge'
          foundry list | grep -q 'symbolic-search-lab'
      - name: Generate offline bundle
        run: |
          foundry run search-forge -- --output-dir /tmp/search-forge --preview /tmp/search-forge.svg
          test -s /tmp/search-forge/index.html
          test -s /tmp/search-forge/search-forge.json
          test -s /tmp/search-forge.svg
