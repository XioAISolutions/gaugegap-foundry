name: Temporary diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  capture:
    if: github.head_ref == 'claude/anomaly-forge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Capture command output
        shell: bash
        run: |
          set +e
          foundry audit > audit-output.txt 2>&1
          echo $? > audit-exit.txt
          foundry run reviewer-packet > reviewer-output.txt 2>&1
          echo $? > reviewer-exit.txt
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: anomaly-diagnostics
          path: |
            audit-output.txt
            audit-exit.txt
            reviewer-output.txt
            reviewer-exit.txt
          retention-days: 1
