name: Verdict eval gate

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  verdict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Config-driven Verdict gate
        run: foundry run verdict-sentiment-f1
