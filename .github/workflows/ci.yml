name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Tests and hard audits
        run: |
          python -m pytest -q -x --tb=short
          foundry audit
      - name: Config-driven finite-track smoke
        run: |
          foundry run gap-sweep-smoke
          foundry run gaugegap-0002
          foundry run gaugegap-u1-0001
          foundry run flowgap-0001
          foundry run flowgap-attractor-smoke
          foundry run curverank-screen-smoke
          foundry run deep-boil-smoke
      - name: Generate Foundry Experience smoke
        run: |
          foundry run foundry-experience -- --output-dir /tmp/foundry-experience --preview /tmp/foundry-experience.svg
          test -s /tmp/foundry-experience/index.html
          test -s /tmp/foundry-experience/research_manifest.json
      - name: Proofpack build smoke
        run: foundry run proofpack-build

  quantum-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quantum extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[quantum,dev]'
      - name: Provider and Pauli regression tests
        run: |
          python -m unittest tests.test_qiskit_backend
          python -m unittest tests.test_qiskit_dynamics
          python -m unittest tests.test_pauli_export
          python -m unittest tests.test_qiskit_validation_optional
      - name: Config-driven certified quantum lane
        run: |
          foundry run curverank-0001
          foundry run quantum-validate
          foundry run certified-bracket
          foundry run certified-shadows
          foundry run open-system
          foundry run certified-quantum
          foundry run physical-limits

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and install
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
      - name: Check console entry points and registered systems
        run: |
          foundry list --json > /tmp/foundry-units.json
          grep -q 'deep-boil-smoke' /tmp/foundry-units.json
          grep -q 'foundry-experience' /tmp/foundry-units.json
          python -c "import numpy as np; np.save('/tmp/id.npy', np.diag([1.0,2.0,3.0,4.0]))"
          gaugegap-certify /tmp/id.npy --output /tmp/cert.json
