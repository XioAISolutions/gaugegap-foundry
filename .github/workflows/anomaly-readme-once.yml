name: Apply Anomaly Forge README once

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'claude/anomaly-forge' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update README without replacing existing sections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          if '<a id="anomaly-forge"></a>' in text:
              print('README already contains Anomaly Forge; no mutation needed.')
              raise SystemExit(0)

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              '  <a href="#-lagrangian-forge--from-symmetry-to-matter">Lagrangian Forge</a> ·\n  <a href="#-attractor-forge--nonlinear-dynamics-you-can-inspect">Attractor Forge</a> ·',
              '  <a href="#-lagrangian-forge--from-symmetry-to-matter">Lagrangian Forge</a> ·\n  <a href="#anomaly-forge">Anomaly Forge</a> ·\n  <a href="#-attractor-forge--nonlinear-dynamics-you-can-inspect">Attractor Forge</a> ·',
              'navigation',
          )
          replace_once(
              '- **Lagrangian Forge** — an audited Standard Model field, sector, interaction, and tree-level mass atlas.\n- **GaugeGap**',
              '- **Lagrangian Forge** — an audited Standard Model field, sector, interaction, and tree-level mass atlas.\n- **Anomaly Forge** — exact rational charge-consistency tests, a hypercharge solver, and a live anomaly-free surface.\n- **GaugeGap**',
              'repository summary',
          )
          replace_once(
              '    F --> L["🧬 Lagrangian Forge<br/>fields · vertices · symmetry breaking"]\n    F --> G["⚛️ GaugeGap<br/>finite gauge systems"]',
              '    F --> L["🧬 Lagrangian Forge<br/>fields · vertices · symmetry breaking"]\n    F --> A["⚖️ Anomaly Forge<br/>charges · constraints · cancellation"]\n    F --> G["⚛️ GaugeGap<br/>finite gauge systems"]',
              'map node',
          )
          replace_once(
              '    L --> L1["SU(3)c × SU(2)L × U(1)Y<br/>interaction hypergraph · audits"]\n    G --> G1',
              '    L --> L1["SU(3)c × SU(2)L × U(1)Y<br/>interaction hypergraph · audits"]\n    A --> A1["exact rational anomalies<br/>hypercharge solver · Witten parity"]\n    G --> G1',
              'map detail',
          )
          replace_once('    class X,L,G,FL,C,P,D edge;', '    class X,L,A,G,FL,C,P,D edge;', 'map class')
          replace_once(
              '| **Experiment** | inspect and manipulate the apparatus | equations, ODE and Standard Model parameter sliders, browser-side RK4 reintegration, projections, DMD diagnostics, interval-step status, Lagrangian audits, Hamiltonian audits, provenance, claim boundaries |',
              '| **Experiment** | inspect and manipulate the apparatus | equations, ODE, Standard Model, and hypercharge sliders; browser-side RK4 reintegration; anomaly residuals; projections; DMD and interval diagnostics; Lagrangian and Hamiltonian audits; provenance; claim boundaries |',
              'mode table',
          )
          replace_once(
              '''Eight scenes ship in the complete generated bundle:

1. Rössler dynamics;
2. Lorenz dynamics;
3. Thomas cyclic dynamics;
4. finite gauge lattice with highlighted Wilson-loop path;
5. exact finite SU(3) octet/decuplet weight geometry;
6. Lagrangian Forge interaction graph, equation wall, symmetry-breaking view, and vertex atlas;
7. canonical Z₂ and truncated U(1) spectra;
8. dimensionless Compton–Schwarzschild mass-radius limits.''',
              '''Nine scenes ship in the complete generated bundle:

1. Rössler dynamics;
2. Lorenz dynamics;
3. Thomas cyclic dynamics;
4. finite gauge lattice with highlighted Wilson-loop path;
5. exact finite SU(3) octet/decuplet weight geometry;
6. Lagrangian Forge interaction graph, equation wall, symmetry-breaking view, and vertex atlas;
7. Anomaly Forge balance ring, triangle channels, fractional-charge cards, and anomaly-free surface;
8. canonical Z₂ and truncated U(1) spectra;
9. dimensionless Compton–Schwarzschild mass-radius limits.''',
              'scene list',
          )
          replace_once(
              '    SM --> LA["Lagrangian audits"]\n    DATA --> DMD',
              '    SM --> LA["Lagrangian audits"]\n    SM --> AN["exact anomaly audit"]\n    DATA --> DMD',
              'pipeline anomaly node',
          )
          replace_once('    LA --> MAN\n    MAN --> UI', '    LA --> MAN\n    AN --> MAN\n    MAN --> UI', 'pipeline manifest')
          replace_once('    GRAPH --> UI\n```', '    GRAPH --> UI\n    AN --> UI\n```', 'pipeline UI')
          replace_once(
              'foundry run foundry-experience-v2\n# focused alias\nfoundry run lagrangian-forge',
              'foundry run foundry-experience-v2\n# focused aliases\nfoundry run lagrangian-forge\nfoundry run anomaly-forge\nfoundry run anomaly-forge-experience',
              'run commands',
          )
          replace_once(
              '- `src/gaugegap/lagrangian_audit.py` — fail-closed charge, dimension, reference, mixing, and source-boundary audits;\n- `src/gaugegap/research_manifest.py`',
              '- `src/gaugegap/lagrangian_audit.py` — fail-closed charge, dimension, reference, mixing, and source-boundary audits;\n- `src/gaugegap/anomaly_audit.py` — exact rational local and global gauge-anomaly coefficients;\n- `src/gaugegap/hypercharge_solver.py` — assumption-labelled minimal and right-neutrino charge solutions;\n- `src/gaugegap/research_manifest.py`',
              'substrate list',
          )
          replace_once(
              '📖 [`docs/foundry-experience.md`](docs/foundry-experience.md) · 🧬 [`docs/lagrangian-forge.md`](docs/lagrangian-forge.md) · ✅ [`docs/deep-boil-verification.md`](docs/deep-boil-verification.md)',
              '📖 [`docs/foundry-experience.md`](docs/foundry-experience.md) · 🧬 [`docs/lagrangian-forge.md`](docs/lagrangian-forge.md) · ⚖️ [`docs/anomaly-forge.md`](docs/anomaly-forge.md) · ✅ [`docs/deep-boil-verification.md`](docs/deep-boil-verification.md)',
              'docs links',
          )
          marker = '> 🧭 **Boundary:** this is a finite symbolic catalog, interaction graph, structural audit, and tree-level calculator—not a scattering-amplitude engine, loop calculation, path-integral evaluation, nonperturbative continuum construction, or Yang–Mills mass-gap proof.\n\n---\n\n## 🌀 Attractor Forge — nonlinear dynamics you can inspect'
          section = '''> 🧭 **Boundary:** this is a finite symbolic catalog, interaction graph, structural audit, and tree-level calculator—not a scattering-amplitude engine, loop calculation, path-integral evaluation, nonperturbative continuum construction, or Yang–Mills mass-gap proof.

---

<a id="anomaly-forge"></a>
## ⚖️ Anomaly Forge — why the fractions fit

Anomaly Forge turns the familiar `+2/3` and `−1/3` quark charges into a live consistency apparatus. The backend uses exact rational arithmetic; the browser lets you move the hypercharges and watch the anomaly channels leave zero.

<p align="center">
  <img src="figures/anomaly-forge/charge-cancellation.svg" alt="Anomaly Forge charge-cancellation map" width="820"/>
</p>

| View | What moves |
|---|---|
| **anomaly balance** | four residual channels switch from green zeroes to red inconsistencies |
| **triangle channels** | `SU(3)²-U(1)`, `SU(2)²-U(1)`, `U(1)³`, and gravity mixing |
| **fractional charges** | live `u`, `d`, proton `uud`, and neutron `udd` charges |
| **constraint surface** | the current assignment moves relative to exact cancellation |

<details open>
<summary><strong>🧪 Try to break the charge assignment</strong></summary>

```bash
foundry run anomaly-forge
foundry run anomaly-forge-experience

# Deliberately move Y_u away from 2/3; --require-pass exits nonzero.
python scripts/run_anomaly_forge.py --y-u 7/10 --require-pass
```

Inside the generated interface, choose **Anomaly Forge** and drag `y_u`, `y_q`, or the colour count. The default point has:

```text
Y_Q = 1/6   Y_u = 2/3   Y_d = -1/3
Y_L = -1/2  Y_e = -1

SU(3)²-U(1) = 0   SU(2)²-U(1) = 0
U(1)³       = 0   gravity²-U(1) = 0
proton      = +1  neutron        = 0
```

</details>

The solver reports its assumptions. Without a right-handed neutrino, the minimal assignment is unique under the declared Higgs and Yukawa assumptions. Adding a Dirac right-handed neutrino exposes the remaining one-parameter anomaly-free family instead of hiding it.

> 🧭 **Boundary:** exact cancellation is proved only for the declared finite chiral field inventory and conventions. It does not show that these charges are unique across every possible theory, construct the continuum Standard Model, or solve a Millennium Prize problem.

---

## 🌀 Attractor Forge — nonlinear dynamics you can inspect'''
          replace_once(marker, section, 'Anomaly Forge section')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit README update
        run: |
          git config user.name gaugegap-bot
          git config user.email actions@users.noreply.github.com
          git add README.md
          if git diff --cached --quiet; then
            echo 'README is already current.'
            exit 0
          fi
          git commit -m "Make Anomaly Forge visual and interactive in README"
          git push origin HEAD:${GITHUB_HEAD_REF}
