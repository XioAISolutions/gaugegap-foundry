version: "3.8"

x-foundry-service: &foundry-service
  build:
    context: .
    dockerfile: Dockerfile
  image: gaugegap-foundry:latest
  volumes:
    - ./results:/app/results
  environment:
    - PYTHONUNBUFFERED=1

services:
  gaugegap-foundry:
    <<: *foundry-service
    container_name: gaugegap-foundry
    command: ["foundry", "run", "curverank-0001"]

  gaugegap-track:
    <<: *foundry-service
    container_name: gaugegap-track
    command: ["foundry", "run", "gaugegap-0002"]
    profiles: ["gaugegap"]

  flowgap-track:
    <<: *foundry-service
    container_name: flowgap-track
    command: ["foundry", "run", "flowgap-0001"]
    profiles: ["flowgap"]

  curverank-track:
    <<: *foundry-service
    container_name: curverank-track
    command: ["foundry", "run", "curverank-0001"]
    profiles: ["curverank"]

  all-tracks:
    <<: *foundry-service
    container_name: gaugegap-all
    command: ["foundry", "all"]
    profiles: ["all"]

  dev:
    <<: *foundry-service
    container_name: gaugegap-dev
    volumes:
      - .:/app
    ports:
      - "8888:8888"
    command:
      - bash
      - -lc
      - >-
        pip install jupyter &&
        jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    profiles: ["dev"]

# Examples:
#   docker compose up
#   docker compose --profile gaugegap up gaugegap-track
#   docker compose --profile flowgap up flowgap-track
#   docker compose --profile curverank up curverank-track
#   docker compose --profile all up all-tracks
