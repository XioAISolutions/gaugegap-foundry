name: Release

# Builds the distribution on a version tag and (if PyPI trusted publishing is
# configured for this project) publishes it. Runs only on tags, so it never
# gates normal PR/CI.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check entry point in the built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import numpy as np; np.save('/tmp/id.npy', np.diag([1.0,2.0,3.0]))"
          gaugegap-certify /tmp/id.npy --output /tmp/cert.json
          python -c "import json; assert json.load(open('/tmp/cert.json'))['n']==3"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI trusted publishing; configure the project on PyPI before first publish.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
