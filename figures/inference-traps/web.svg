<svg xmlns="http://www.w3.org/2000/svg" width="940" height="620" viewBox="0 0 940 620"><rect width="940" height="620" fill="#0b0e14"/><text x="470" y="46" font-size="23" fill="#e6edf3" text-anchor="middle" font-family="monospace">The web of inference traps</text><text x="470" y="72" font-size="13" fill="#8b949e" text-anchor="middle" font-family="monospace">viral statistics 'mind-benders', each reduced to an exact, certifiable core</text><polygon points="40,110 460,110 460,310 40,310" fill="#11151c" stroke="#f0c674" stroke-width="2" opacity="1"/><text x="58" y="140" font-size="17" fill="#f0c674" text-anchor="start" font-family="monospace">Heavy-tail traps  ·  the mean misleads</text><circle cx="64" cy="169" r="4.5" fill="#f0c674" stroke="none" stroke-width="0" opacity="1"/><text x="78" y="174" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">St. Petersburg paradox</text><text x="78" y="192" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">naive EV = ∞, but bounded-utility value = $4</text><circle cx="64" cy="221" r="4.5" fill="#f0c674" stroke="none" stroke-width="0" opacity="1"/><text x="78" y="226" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">Power law</text><text x="78" y="244" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">scale-free tail; E[X^m]=∞ iff m≥α</text><polygon points="480,110 900,110 900,470 480,470" fill="#11151c" stroke="#58a6ff" stroke-width="2" opacity="1"/><text x="498" y="140" font-size="17" fill="#58a6ff" text-anchor="start" font-family="monospace">Selection / conditioning traps</text><circle cx="504" cy="169" r="4.5" fill="#58a6ff" stroke="none" stroke-width="0" opacity="1"/><text x="518" y="174" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">Survivorship bias (Wald)</text><text x="518" y="192" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">armor the holes you DON'T see on survivors</text><circle cx="504" cy="221" r="4.5" fill="#58a6ff" stroke="none" stroke-width="0" opacity="1"/><text x="518" y="226" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">Berkson's paradox</text><text x="518" y="244" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">selection makes independent traits anti-correlate (−½)</text><circle cx="504" cy="273" r="4.5" fill="#58a6ff" stroke="none" stroke-width="0" opacity="1"/><text x="518" y="278" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">Simpson's paradox</text><text x="518" y="296" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">every subgroup favours A, the aggregate favours B</text><circle cx="504" cy="325" r="4.5" fill="#58a6ff" stroke="none" stroke-width="0" opacity="1"/><text x="518" y="330" font-size="14" fill="#e6edf3" text-anchor="start" font-family="monospace">Regression to the mean</text><text x="518" y="348" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">extremes are followed by E[Y|X=x]=ρx, closer in</text><polygon points="40,350 460,350 460,470 40,470" fill="#11151c" stroke="#7ee787" stroke-width="2" opacity="1"/><text x="58" y="380" font-size="17" fill="#7ee787" text-anchor="start" font-family="monospace">Bayes' theorem  ·  the corrective</text><text x="78" y="410" font-size="12" fill="#8b949e" text-anchor="start" font-family="monospace">force the base rate into the calculation:</text><text x="78" y="432" font-size="13" fill="#e6edf3" text-anchor="start" font-family="monospace">99%-accurate test, 0.1% prevalence</text><text x="78" y="452" font-size="14" fill="#7ee787" text-anchor="start" font-family="monospace">⇒ P(disease | +) ≈ 1.9%</text><text x="470" y="594" font-size="12" fill="#8b949e" text-anchor="middle" font-family="monospace">exact closed forms, each with a claim boundary — companion to the physical-limits web</text><text x="470" y="610" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">decision theory &amp; statistics — NOT physical bounds</text></svg>
