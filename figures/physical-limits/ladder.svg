" font-family="monospace">energy ↔ geometry</text><text x="840" y="570" font-size="16" fill="#d2a8ff" text-anchor="end" font-family="monospace">ρ ≤ 0  (needs neg. energy)</text><line x1="60" y1="600" x2="860" y2="600" stroke="#222831" stroke-width="1" opacity="1"/><circle cx="84" cy="634" r="7" fill="#d2a8ff" stroke="none" stroke-width="0" opacity="1"/><text x="104" y="630" font-size="15" fill="#e6edf3" text-anchor="start" font-family="monospace">Cherenkov cone</text><text x="104" y="650" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">velocity ↔ geometry</text><text x="840" y="640" font-size="16" fill="#d2a8ff" text-anchor="end" font-family="monospace">cos θc = 1/(nβ),  β &gt; 1/n</text><line x1="60" y1="670" x2="860" y2="670" stroke="#222831" stroke-width="1" opacity="1"/><circle cx="84" cy="704" r="7" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="104" y="700" font-size="15" fill="#e6edf3" text-anchor="start" font-family="monospace">Lieb–Robinson cone</text><text x="104" y="720" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">information ↔ time</text><text x="840" y="710" font-size="16" fill="#7ee787" text-anchor="end" font-family="monospace">x(t) ≤ v_LR·t + ξ</text><line x1="60" y1="740" x2="860" y2="740" stroke="#222831" stroke-width="1" opacity="1"/><circle cx="84" cy="774" r="7" fill="#d2a8ff" stroke="none" stroke-width="0" opacity="1"/><text x="104" y="770" font-size="15" fill="#e6edf3" text-anchor="start" font-family="monospace">Compton–Schwarzschild</text><text x="104" y="790" font-size="11" fill="#8b949e" text-anchor="start" font-family="monospace">mass ↔ geometry</text><text x="840" y="780" font-size="16" fill="#d2a8ff" text-anchor="end" font-family="monospace">R² ≥ R_s·λ_C = 2 l_P²</text><line x1="60" y1="810" x2="860" y2="810" stroke="#222831" stroke-width="1" opacity="1"/></svg>
