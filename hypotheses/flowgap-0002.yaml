id: flowgap-0002
track: FlowGap
model: rossler_finite_ode
scope: finite-time Rössler-system ODE diagnostics (Attractor Forge)
claim: >
  Deterministic finite-time integration of the Rössler system at the registered
  parameters produces reproducible trajectory, Poincaré-section, return-map, and
  Lyapunov-spectrum diagnostics, and the emitted Lean/Coq certificate discharges
  only its stated algebraic divergence inequality.
prediction:
  observable: largest_lyapunov_exponent
  expected_shape: finite_positive_estimate_at_registered_parameters
controls:
  system: rossler
  params: {a: 0.2, b: 0.2, c: 5.7}
  dt: 0.01
  steps: 30000
  transient: 5000
  lyapunov_steps: 30000
  bifurcation_points: 24
validation:
  required:
    - deterministic_finite_integration
    - lyapunov_spectrum_estimate
    - divergence_certificate
kill_criteria:
  - integration is non-deterministic for a fixed seed and parameters
  - the emitted certificate claims more than its stated divergence inequality
  - diagnostics change qualitatively under a tighter time step at fixed horizon
status: active
claim_boundary: >
  Finite-time numerical ODE diagnostics only; not a proof of chaos, global
  attraction, fractal dimension, or ergodicity. No continuum or Millennium claim.
notes:
  - Lyapunov/recurrence values are finite-horizon estimates, not asymptotic invariants.
