name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Smoke sweep
        run: python scripts/run_gap_sweep.py --sizes 4,6 --field-points 3 --output-dir /tmp/gaugegap-smoke
      - name: Quantum boundary status
        run: python scripts/quantum_status.py --output-dir /tmp/gaugegap-quantum-status
      - name: FlowGap smoke
        run: python scripts/run_flowgap_burgers.py --sizes 16,32 --nu-points 3 --n-steps 20 --output-dir /tmp/flowgap-smoke
      - name: U(1) gauge smoke
        run: python scripts/run_gaugegap_u1.py --n-links 2 --truncation 1,2 --g-mag-points 3 --output-dir /tmp/u1-smoke

  spectral-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install spectral extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[spectral]'
      - name: CurveRank smoke
        run: python scripts/run_curverank_screen.py --family xp --n-basis 10,20 --k-zeros 10 --output-dir /tmp/curverank-smoke

  braket-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install braket extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[braket]'
      - name: Braket unit tests
        run: python -m unittest tests.test_braket_runner
      - name: Braket local simulator smoke
        run: python scripts/run_hardware.py --provider braket-local --n-sites 4 --times 0,0.5 --shots 128 --output-dir /tmp/braket-smoke

  quantum-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quantum extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[quantum]'
      - name: Qiskit Pauli smoke
        run: |
          python -m unittest tests.test_qiskit_backend
          python -m unittest tests.test_qiskit_dynamics
          python -m unittest tests.test_ibm_runtime_runner
          python scripts/run_gap_sweep.py --method qiskit-pauli --sizes 4,6 --field-points 3 --output-dir /tmp/gaugegap-qiskit-smoke
          python scripts/run_dynamics.py --backend statevector --n-sites 4 --times 0,0.5 --output-dir /tmp/gaugegap-statevector-smoke
          python scripts/run_dynamics.py --backend aer-sampler --n-sites 4 --times 0,0.5 --shots 128 --output-dir /tmp/gaugegap-aer-smoke
          python scripts/run_dynamics.py --backend aer-sampler --noise depolarizing --n-sites 4 --times 0,0.5 --shots 128 --output-dir /tmp/gaugegap-aer-depol-smoke
          mkdir -p /tmp/gaugegap-dynamics-combined
          cp /tmp/gaugegap-statevector-smoke/*.csv /tmp/gaugegap-dynamics-combined/
          cp /tmp/gaugegap-aer-smoke/*.csv /tmp/gaugegap-dynamics-combined/
          cp /tmp/gaugegap-aer-depol-smoke/*.csv /tmp/gaugegap-dynamics-combined/
          python scripts/analyze_dynamics.py --input-dir /tmp/gaugegap-dynamics-combined --output-dir /tmp/gaugegap-analysis-smoke
