version: 1

units:
  flowgap-0005-navier-stokes:
    track: flowgap
    hypothesis: flowgap-0005
    status: production
    description: Finite 2D incompressible Navier-Stokes surrogate (Taylor-Green vortex) with convergence check.
    command:
      ["{python}", "scripts/run_flowgap_navier_stokes.py", "--grid", "16",
       "--refine-grid", "24", "--nu", "0.02", "--dt", "0.001", "--n-steps", "200",
       "--output-dir", "results/flowgap-0005"]

  flowgap-0005-smoke:
    track: flowgap
    hypothesis: flowgap-0005
    status: production
    description: Reduced deterministic Navier-Stokes surrogate for CI and local checks.
    command:
      ["{python}", "scripts/run_flowgap_navier_stokes.py", "--grid", "12",
       "--refine-grid", "16", "--nu", "0.02", "--dt", "0.001", "--n-steps", "60",
       "--output-dir", "/tmp/flowgap-0005-smoke"]

groups:
  navier-stokes:
    - flowgap-0005-navier-stokes
