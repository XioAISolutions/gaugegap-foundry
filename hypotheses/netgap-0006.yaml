id: netgap-0006
track: NetGap
model: qubit_noise_channels
scope: exact single-qubit CPTP noise channels and the quantum-advantage fidelity floor
claim: >
  Amplitude-damping (T1), phase-damping (T2), and depolarizing channels are exact CPTP
  maps whose average gate fidelity F_avg = (2 F_e + 1)/3 exceeds the classical
  measure-and-prepare bound 2/3 exactly when the entanglement fidelity F_e exceeds 1/2,
  discharged as a formal inequality.
prediction:
  observable: average_gate_fidelity
  expected_shape: beats_two_thirds_iff_entanglement_fidelity_above_half
validation:
  required:
    - channels_are_trace_preserving
    - average_fidelity_two_Fe_plus_one_over_three
    - discharged_quantum_advantage_certificate
kill_criteria:
  - a channel is not trace preserving
  - the average-fidelity relation fails
  - the advantage threshold is not at F_e = 1/2
status: active
claim_boundary: >
  Exact single-qubit CPTP channel models only; not a device-calibrated noise model or a
  hardware fidelity guarantee.
