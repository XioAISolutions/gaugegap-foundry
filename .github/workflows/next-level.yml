name: Next-level scientific quality

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_DATE_EPOCH: "1700000000"

jobs:
  scientific-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Foundation, charge consistency, and quantum-information tests
        run: |
          python -m pytest -q tests/test_next_level_foundation.py
          python -m pytest -q tests/test_anomaly_forge.py tests/test_lagrangian_forge_integration.py
          python -m pytest -q tests/test_no_hiding.py
      - name: Known answers, inventory, formal registry, and source manifest
        run: foundry run next-level-foundation
      - name: Exact charge audit
        run: foundry run anomaly-forge
      - name: InfoGap no-hiding smoke
        run: foundry run infogap-smoke
      - name: Complete ten-scene interface
        run: |
          foundry run foundry-experience-v2 -- --output-dir /tmp/foundry-experience --preview /tmp/foundry-experience.svg
          test -s /tmp/foundry-experience/index.html
          test -s /tmp/foundry-experience/research_manifest.json

  reproducible-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel twice from identical inputs
        run: |
          python -m pip install --upgrade pip build
          mkdir -p /tmp/build-a /tmp/build-b
          python -m build --wheel --outdir /tmp/build-a
          python -m build --wheel --outdir /tmp/build-b
          cmp /tmp/build-a/*.whl /tmp/build-b/*.whl
          sha256sum /tmp/build-a/*.whl /tmp/build-b/*.whl
