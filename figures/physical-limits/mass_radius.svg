<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720"><rect width="920" height="720" fill="#0b0e14"/><text x="460" y="44" font-size="22" fill="#e6edf3" text-anchor="middle" font-family="monospace">The cosmic mass–radius diagram</text><text x="460" y="70" font-size="13" fill="#8b949e" text-anchor="middle" font-family="monospace">every object sits between two certified limits — they meet at the Planck point</text><polygon points="92,96 700.237,96 -196.871,650 92,650" fill="#8b2f2f" stroke="none" stroke-width="1" opacity="0.18"/><polygon points="92,650 -459.039,96 438.068,650 92,96" fill="#2f4b8b" stroke="none" stroke-width="1" opacity="0.16"/><line x1="-196.871" y1="650" x2="700.237" y2="96" stroke="#ff7b72" stroke-width="2.4" opacity="1"/><line x1="438.068" y1="650" x2="-459.039" y2="96" stroke="#58a6ff" stroke-width="2.4" opacity="1"/><circle cx="120.599" cy="453.95" r="6" fill="#f0c674" stroke="#0b0e14" stroke-width="1.5" opacity="1"/><text x="130.599" y="457.95" font-size="12" fill="#f0c674" text-anchor="start" font-family="monospace">Planck point  (√2 l_P)</text><line x1="92" y1="650" x2="880" y2="650" stroke="#8b949e" stroke-width="1.2" opacity="1"/><line x1="92" y1="650" x2="92" y2="96" stroke="#8b949e" stroke-width="1.2" opacity="1"/><line x1="104.123" y1="650" x2="104.123" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="104.123" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e-36</text><line x1="201.108" y1="650" x2="201.108" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="201.108" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e-28</text><line x1="298.092" y1="650" x2="298.092" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="298.092" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e-20</text><line x1="395.077" y1="650" x2="395.077" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="395.077" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e-12</text><line x1="492.062" y1="650" x2="492.062" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="492.062" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e-4</text><line x1="589.046" y1="650" x2="589.046" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="589.046" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e4</text><line x1="686.031" y1="650" x2="686.031" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="686.031" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e12</text><line x1="783.015" y1="650" x2="783.015" y2="655" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="783.015" y="668" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">1e20</text><line x1="87" y1="635.027" x2="92" y2="635.027" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="638.027" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e-32</text><line x1="87" y1="575.135" x2="92" y2="575.135" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="578.135" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e-24</text><line x1="87" y1="515.243" x2="92" y2="515.243" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="518.243" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e-16</text><line x1="87" y1="455.351" x2="92" y2="455.351" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="458.351" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e-8</text><line x1="87" y1="395.459" x2="92" y2="395.459" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="398.459" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e0</text><line x1="87" y1="335.568" x2="92" y2="335.568" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="338.568" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e8</text><line x1="87" y1="275.676" x2="92" y2="275.676" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="278.676" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e16</text><line x1="87" y1="215.784" x2="92" y2="215.784" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="218.784" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e24</text><line x1="87" y1="155.892" x2="92" y2="155.892" stroke="#8b949e" stroke-width="1" opacity="1"/><text x="84" y="158.892" font-size="10" fill="#8b949e" text-anchor="end" font-family="monospace">1e32</text><text x="460" y="690" font-size="13" fill="#e6edf3" text-anchor="middle" font-family="monospace">radius  [m]</text><circle cx="390.068" cy="620.357" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="397.068" y="623.357" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">electron</text><circle cx="357.79" cy="595.921" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="364.79" y="598.921" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">proton</text><circle cx="452.043" cy="537.703" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="459.043" y="540.703" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">virus</text><circle cx="536.904" cy="381.646" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="543.904" y="384.646" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">human</text><circle cx="609.643" cy="283.162" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="616.643" y="286.162" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">asteroid</text><circle cx="623.042" cy="209.973" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="630.042" y="212.973" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">Earth</text><circle cx="635.654" cy="191.241" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="642.654" y="194.241" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">Jupiter</text><circle cx="647.751" cy="168.629" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="654.751" y="171.629" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">Sun</text><circle cx="623.537" cy="168.018" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="630.537" y="171.018" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">white dwarf</text><circle cx="590.006" cy="167.517" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="597.006" y="170.517" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">neutron star</text><circle cx="662.745" cy="119.081" r="3.4" fill="#7ee787" stroke="none" stroke-width="0" opacity="1"/><text x="669.745" y="122.081" font-size="10" fill="#e6edf3" text-anchor="start" font-family="monospace">Sgr A* (SMBH)</text><text x="176.862" y="185.838" font-size="14" fill="#ff7b72" text-anchor="middle" font-family="monospace">forbidden by gravity</text><text x="176.862" y="167.122" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">(R &lt; R_s : black hole)</text><text x="273.846" y="620.054" font-size="13" fill="#58a6ff" text-anchor="middle" font-family="monospace">forbidden by quantum uncertainty</text><text x="273.846" y="636.524" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">(R &lt; λ_C)</text><text x="710.277" y="380.486" font-size="15" fill="#7ee787" text-anchor="middle" font-family="monospace">allowed</text><text x="460" y="708" font-size="10" fill="#8b949e" text-anchor="middle" font-family="monospace">R_s·λ_C = 2 l_P² for every mass — a machine-checked identity</text></svg>
